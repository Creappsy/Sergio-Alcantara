version: '3.8'

services:
  creappsy-form:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Server-side only (API routes)
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_BUCKET_NAME=${B2_BUCKET_NAME:-creappsy}
      - GOFILE_TOKEN=${GOFILE_TOKEN}
      - GOFILE_FOLDER_ID=${GOFILE_FOLDER_ID}
      - WEB3FORMS_KEY=${WEB3FORMS_KEY}
      - EMAIL_DESTINO=${EMAIL_DESTINO}
      # Client-side (NEXT_PUBLIC_*)
      - NEXT_PUBLIC_WEB3FORMS_KEY=${NEXT_PUBLIC_WEB3FORMS_KEY}
      - NEXT_PUBLIC_EMAIL_DESTINO=${NEXT_PUBLIC_EMAIL_DESTINO}
      - NEXT_PUBLIC_MAX_ATTEMPTS=${NEXT_PUBLIC_MAX_ATTEMPTS:-5}
      - NEXT_PUBLIC_BLOCK_DURATION_MS=${NEXT_PUBLIC_BLOCK_DURATION_MS:-900000}
      - NEXT_PUBLIC_B2_BUCKET_NAME=${B2_BUCKET_NAME:-creappsy}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s